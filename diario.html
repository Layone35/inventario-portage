    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        if (localStorage.getItem('auth') !== 'ester_logged_in') {
            window.location.href = 'login.html';
        }
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="pb-24 bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Top App Bar (PWA) -->
    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-40 no-print" style="padding-top: env(safe-area-inset-top);">
        <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center font-black text-white shadow-inner">E</div>
                <h1 class="font-bold text-lg tracking-tight">Diário de Bordo</h1>
            </div>
            <div class="flex items-center space-x-3">

                <div id="sync-status" class="flex items-center text-xs font-semibold text-indigo-200 bg-indigo-700/50 px-2 py-1 rounded-full border border-indigo-500/30 shadow-inner">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-300 mr-1.5 inline-block"></span>
                    <span>Offline</span>
                </div>

                <button onclick="localStorage.removeItem('auth'); window.location.href='login.html';" class="p-2 -mr-2 text-indigo-100 hover:text-white transition-colors" title="Sair">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </div>
    </header>


    

    <main class="flex-grow max-w-3xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        
        

        <!-- Formulário de Nova Entrada -->
        <div class="bg-white p-5 sm:p-6 shadow-sm border border-slate-200 rounded-2xl">
            <h2 class="text-sm font-bold text-slate-700 uppercase tracking-widest mb-4">Nova Anotação</h2>
            
            <form id="logForm" class="space-y-4">
                <textarea id="logText" rows="3" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 transition-colors resize-none" placeholder="Escreva o que aconteceu hoje... (ex: Conseguiu pedir água apontando; Não deixou tocar no cabelo)" required></textarea>
                
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="logType" value="conquista" class="peer sr-only" required>
                            <div class="px-3 py-1.5 rounded-full text-xs font-bold border border-emerald-200 bg-emerald-50 text-emerald-700 peer-checked:bg-emerald-600 peer-checked:text-white transition-all shadow-sm">🟢 Conquista</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="logType" value="desafio" class="peer sr-only">
                            <div class="px-3 py-1.5 rounded-full text-xs font-bold border border-rose-200 bg-rose-50 text-rose-700 peer-checked:bg-rose-600 peer-checked:text-white transition-all shadow-sm">🔴 Desafio / Piora</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="logType" value="observacao" class="peer sr-only" checked>
                            <div class="px-3 py-1.5 rounded-full text-xs font-bold border border-amber-200 bg-amber-50 text-amber-700 peer-checked:bg-amber-500 peer-checked:text-white transition-all shadow-sm">🟡 Observação</div>
                        </label>
                    </div>
                    
                    <button type="submit" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all disabled:opacity-50" id="saveBtn">
                        Adicionar ao Diário
                    </button>
                </div>
            </form>
        </div>

        <!-- Timeline -->
        <div class="bg-white p-5 sm:p-6 shadow-sm border border-slate-200 rounded-2xl">
            <h2 class="text-sm font-bold text-slate-700 uppercase tracking-widest mb-6 border-b border-slate-100 pb-2">Linha do Tempo</h2>
            
            <div id="timeline-container" class="space-y-6 pl-2 border-l-2 border-slate-100 ml-3">
                <!-- Logs will be injected here -->
                <div class="text-slate-400 text-sm italic ml-4">Carregando anotações...</div>
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = 'https://ftsrjkngineekilrarrd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0c3Jqa25naW5lZWtpbHJhcnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjExMjcsImV4cCI6MjA5MTY5NzEyN30.aEAeumrSj8Jc5NmvgpZrqfTCD-hYhdl3_rom5yZRX3k';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let obsState = { logs: [] };

        const syncStatus = document.getElementById('sync-status');
        const syncStatusCircle = syncStatus.querySelector('span:first-child');
        const syncStatusText = syncStatus.querySelector('span:last-child');

        function setStatus(state) {
            if (state === 'syncing') {
                syncStatusCircle.className = 'w-2 h-2 rounded-full mr-2 inline-block animate-pulse bg-amber-400';
                syncStatusText.innerText = 'Salvando...';
            } else if (state === 'synced') {
                syncStatusCircle.className = 'w-2 h-2 rounded-full mr-2 inline-block bg-emerald-500';
                syncStatusText.innerText = 'Salvo na Nuvem';
            } else if (state === 'error') {
                syncStatusCircle.className = 'w-2 h-2 rounded-full mr-2 inline-block bg-rose-500';
                syncStatusText.innerText = 'Erro de Conexão';
            }
        }

        async function loadData() {
            try {
                const { data, error } = await supabaseClient.from('portage_data').select('observations').eq('id', 1).single();
                if (error) throw error;
                
                if (data && data.observations) {
                    obsState = data.observations;
                    if (!obsState.logs) obsState.logs = [];
                }
                
                renderTimeline();
                setStatus('synced');
            } catch (err) {
                console.error(err);
                setStatus('error');
            }
        }

        async function saveLog(text, type) {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            setStatus('syncing');

            const newLog = {
                id: Date.now(),
                date: new Date().toISOString(),
                text: text,
                type: type
            };

            obsState.logs.push(newLog);

            try {
                const { error } = await supabaseClient.from('portage_data').update({
                    observations: obsState
                }).eq('id', 1);

                if (error) throw error;
                
                document.getElementById('logText').value = '';
                renderTimeline();
                setStatus('synced');
            } catch (err) {
                console.error(err);
                obsState.logs.pop(); // rollback
                setStatus('error');
                alert("Erro ao salvar a anotação na nuvem.");
            } finally {
                saveBtn.disabled = false;
            }
        }

        async function deleteLog(id) {
            if(!confirm("Deseja realmente apagar esta anotação?")) return;
            
            setStatus('syncing');
            const index = obsState.logs.findIndex(l => l.id === id);
            if(index === -1) return;
            
            const removed = obsState.logs.splice(index, 1)[0];
            
            try {
                const { error } = await supabaseClient.from('portage_data').update({
                    observations: obsState
                }).eq('id', 1);
                if (error) throw error;
                renderTimeline();
                setStatus('synced');
            } catch (err) {
                console.error(err);
                obsState.logs.splice(index, 0, removed); // rollback
                setStatus('error');
                alert("Erro ao apagar a anotação.");
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            const logs = obsState.logs || [];
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-sm ml-4 py-4">Nenhuma anotação no diário ainda. Escreva sua primeira observação acima!</div>';
                return;
            }

            // Sort newest first
            const sortedLogs = logs.slice().sort((a, b) => new Date(b.date) - new Date(a.date));

            let html = '';
            sortedLogs.forEach(log => {
                const dateObj = new Date(log.date);
                const timeStr = dateObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const dateStr = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
                
                let iconStr = '';
                let colorClass = '';
                
                if (log.type === 'conquista') {
                    iconStr = '🟢';
                    colorClass = 'bg-emerald-50 border-emerald-200 text-emerald-900';
                } else if (log.type === 'desafio') {
                    iconStr = '🔴';
                    colorClass = 'bg-rose-50 border-rose-200 text-rose-900';
                } else {
                    iconStr = '🟡';
                    colorClass = 'bg-amber-50 border-amber-200 text-amber-900';
                }

                html += `
                <div class="relative pl-6 pb-6">
                    <!-- Timeline dot -->
                    <div class="absolute w-3 h-3 bg-slate-300 rounded-full -left-[7px] top-2 border-2 border-white"></div>
                    
                    <div class="rounded-xl border p-4 shadow-sm ${colorClass} relative group transition-all hover:shadow-md">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-xs font-bold opacity-60 uppercase tracking-wider">${iconStr} ${dateStr} às ${timeStr}</span>
                            <button onclick="deleteLog(${log.id})" class="text-slate-400 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-opacity" title="Apagar anotação">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                        <p class="text-sm font-medium mt-2 whitespace-pre-wrap">${log.text}</p>
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
        }

        document.getElementById('logForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const text = document.getElementById('logText').value;
            const type = document.querySelector('input[name="logType"]:checked').value;
            saveLog(text, type);
        });

        loadData();
    </script>

    <nav class="no-print fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-[100] pb-safe" style="padding-bottom: env(safe-area-inset-bottom);">

                <span class="text-[10px] font-semibold">Portage</span>
            </a>
            <a href="spm.html" class="flex flex-col items-center justify-center w-full h-full hover:bg-slate-50 transition-colors text-slate-500">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"></path></svg>
                <span class="text-[10px] font-semibold">SPM</span>
            </a>
            <a href="resumo.html" class="flex flex-col items-center justify-center w-full h-full hover:bg-slate-50 transition-colors text-slate-500">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                <span class="text-[10px] font-semibold">Resumo</span>
            </a>
            <a href="diario.html" class="flex flex-col items-center justify-center w-full h-full hover:bg-slate-50 transition-colors text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                <span class="text-[10px] font-semibold">Diário</span>
            </a>
        </div>
    </nav>

</body>
</html>
