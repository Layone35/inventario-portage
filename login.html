<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Seguro - Sistema Clínico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-200 p-8 sm:p-10 transform transition-all duration-300 hover:shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Área Restrita</h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">Por favor, insira a senha para acessar os prontuários e laudos da Ester.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Senha de Acesso</label>
                <input type="password" id="password" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 transition-colors" placeholder="••••••••" required>
            </div>
            <p id="error-msg" class="text-sm text-rose-500 font-medium hidden">Senha incorreta. Tente novamente.</p>
            <button type="submit" class="w-full text-white bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:outline-none focus:ring-indigo-300 font-bold rounded-xl text-sm px-5 py-3.5 text-center shadow-md transition-all">Entrar no Sistema</button>
        </form>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('auth') === 'ester_logged_in') {
            window.location.href = 'index.html';
        }

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            // Senha configurada: Ester@2026
            if (password === 'Ester@2026') {
                localStorage.setItem('auth', 'ester_logged_in');
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
